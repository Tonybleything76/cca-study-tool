* { box-sizing: border-box; }

  { "id": "f-s01-01", "section": 1, "front": "Is the Messages API stateful or stateless?", "back": "Stateless. Claude sees only what each request contains — your application stores history and resends the relevant context every turn.", "source": "cheatsheet" },
  { "id": "f-s01-02", "section": 1, "front": "What does a `session_id` do for Claude's memory?", "back": "Nothing at the model level. It can help YOUR system locate stored history, but the model only sees the request contents.", "source": "pitfall" },
  { "id": "f-s01-03", "section": 1, "front": "`tool_choice`: what do `auto`, `any`, `tool`, and `none` each mean?", "back": "`auto`: may call a tool or answer normally. `any`: must call one of the provided tools. `tool`: must call one specific named tool. `none`: cannot call tools.", "source": "table" },
  { "id": "f-s01-04", "section": 1, "front": "When do you use `tool_choice: \"any\"` instead of `auto` + prompt instructions?", "back": "When a tool call MUST happen but the right schema isn't known in advance (e.g., several extraction tools). `auto` can still produce conversational text in edge cases; `any` cannot.", "source": "cheatsheet" },
  { "id": "f-s01-05", "section": 1, "front": "What happened to partial assistant prefill on current models?", "back": "It's legacy — a request ending with an assistant message now returns a validation error. Use structured outputs for format, enum schema fields for labels, system instructions for suppressing preamble.", "source": "cheatsheet" },
  { "id": "f-s01-06", "section": 1, "front": "Why do long conversations get slower and more expensive every turn?", "back": "The full history is resent as input tokens on every request — cost and latency grow with conversation length. It's not a model or database defect.", "source": "pitfall" },
  { "id": "f-s01-07", "section": 1, "front": "What's the most effective response when an extraction fails semantic validation?", "back": "Call Claude again with the source, the invalid extraction, and the specific validation errors — the validation-error feedback loop. Far better than retrying the same prompt.", "source": "cheatsheet" },
  { "id": "f-s01-08", "section": 1, "front": "Does schema compliance mean the output is correct?", "back": "No. Structured outputs guarantee shape, not truth. Refusals and max-token stops can still yield nonconforming output. Domain validation in code remains necessary.", "source": "pitfall" },
  { "id": "f-s01-09", "section": 1, "front": "Do tool definitions and schemas cost tokens?", "back": "Yes — they count as input/overhead tokens. A large schema plus a long document can approach the context limit, degrading accuracy on content near the end.", "source": "pitfall" }
]
</script>

  { "id": "f-s02-02", "section": 2, "front": "When should one tool be split into several?", "back": "When operations have different required fields or interdependent constraints. Separate tools let each schema encode its own requirements — invalid combinations become unrepresentable.", "source": "cheatsheet" },
  { "id": "f-s02-03", "section": 2, "front": "What is lookup-then-act?", "back": "A search tool returns stable IDs with distinguishing metadata; mutating tools accept only IDs. Ambiguous names never reach a destructive operation. Multiple candidates → let the user pick.", "source": "cheatsheet" },
  { "id": "f-s02-04", "section": 2, "front": "A search finds nothing. Error or success?", "back": "Success — return an empty `results` array with a count. `isError` would make the agent retry a valid query. Absence and failure must be distinguishable.", "source": "pitfall" },
  { "id": "f-s02-05", "section": 2, "front": "How should a tool handle APIs that return thousands of matches?", "back": "Return the first page + `total_count` + a cursor. Fetch more only when needed. Auto-fetching every page burns latency, tokens, and context.", "source": "cheatsheet" },
  { "id": "f-s02-06", "section": 2, "front": "An agent has dozens of connectors. How do you avoid tool-selection degradation?", "back": "Progressive availability: discovery tools return a ranked shortlist, then relevant tools are dynamically added to the agent. NOT a `find_and_execute` tool — that hides the final decision.", "source": "cheatsheet" },
  { "id": "f-s02-07", "section": 2, "front": "Why is `dry_run: boolean` not a safety mechanism?", "back": "The model sets the flag, so nothing prevents `dry_run: false`. Use preview → one-time confirmation token → execute-with-token so the interface enforces the sequence.", "source": "pitfall" },
  { "id": "f-s02-08", "section": 2, "front": "When is combining two tools into one the RIGHT call?", "back": "Mechanical sequences with no decision between steps, repeated lookups that always co-occur, and atomicity needs (check-and-book where a slot could be taken between calls). Never to hide judgment.", "source": "cheatsheet" },
  { "id": "f-s02-09", "section": 2, "front": "ML tool outputs include confidence scores. Return them raw?", "back": "No — calibrate thresholds against a labeled set and return a derived `requires_review` boolean with reasons. Raw scores invite over-trust and over-escalation.", "source": "cheatsheet" },
  { "id": "f-s02-10", "section": 2, "front": "When should an action get a dedicated tool instead of going through Bash?", "back": "When the application needs to gate, confirm, render, audit, or parallelize it. A `send_email` call can be intercepted; `bash -c \"curl ...\"` is an opaque string.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s03">
[
  { "id": "f-s03-01", "section": 3, "front": "Name the five error categories for agent tools.", "back": "Transient infrastructure (retry in tool), permanent validation (structured details to agent), business rule (non-retryable + explanation), permission (non-retryable + escalation path), uncertain write state (report uncertainty, no auto-retry).", "source": "table" },
  { "id": "f-s03-02", "section": 3, "front": "Where does retry logic belong?", "back": "Where the corrective information lives: tool-level for transient backend noise; model-level when inputs/strategy must change; human approval when retry could duplicate a side effect or violate policy.", "source": "cheatsheet" },
  { "id": "f-s03-03", "section": 3, "front": "MCP: protocol error vs tool execution error?", "back": "Protocol (JSON-RPC error): the call itself was malformed — unknown tool, missing schema-required parameter. Execution (`isError: true`): the tool ran and the operation failed — 404, 503, business rules, permissions.", "source": "cheatsheet" },
  { "id": "f-s03-04", "section": 3, "front": "A write request times out AFTER submission. What must the tool do?", "back": "Return an uncertain-state error: \"delivery status unknown, may have succeeded, do not retry without idempotency check.\" Steer toward a status lookup or user confirmation. Never mark it retry-safe.", "source": "cheatsheet" },
  { "id": "f-s03-05", "section": 3, "front": "Why not throw exceptions for expected business errors?", "back": "Frameworks often hide exception details from the model. Return structured results: category, retryable flag, user-facing explanation, next steps.", "source": "pitfall" },
  { "id": "f-s03-06", "section": 3, "front": "Backend API fails — can the tool return an empty list?", "back": "No. An empty list means \"success with no matches.\" Returning it on failure turns an outage into confident misinformation.", "source": "pitfall" },
  { "id": "f-s03-07", "section": 3, "front": "Why is a `retryable: true` flag weaker than retrying inside the tool?", "back": "The flag still costs a model turn per transient failure, and the agent may ignore it. For unambiguously-correct retries, encode the behavior, not the advice.", "source": "cheatsheet" },
  { "id": "f-s03-08", "section": 3, "front": "Read timeout vs write-after-submission timeout — how do they differ?", "back": "They're inverses: read timeouts are usually safe to retry (do it in the tool); a write submitted before timing out may have succeeded, so retrying risks duplicates — verify instead.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s04">
[
  { "id": "f-s04-01", "section": 4, "front": "What can a schema verify — and what can it never verify?", "back": "It verifies shape (types, presence, enums). It can never verify that the source actually supports the value. Schema compliance ≠ source truth.", "source": "pitfall" },
  { "id": "f-s04-02", "section": 4, "front": "Why do required fields cause hallucination in extraction?", "back": "If the source may not contain the information but the schema demands a value, the model is structurally pressured to invent one. Make such fields optional/nullable and teach `null`.", "source": "pitfall" },
  { "id": "f-s04-03", "section": 4, "front": "Strict enum, but new categories keep appearing. Pattern?", "back": "Add an `other` enum value paired with a `*_detail` field holding the source's actual wording. Long-tail categories survive without schema rewrites.", "source": "cheatsheet" },
  { "id": "f-s04-04", "section": 4, "front": "Is a second LLM \"verification call\" a good fix for fabricated values?", "back": "Generally no — it adds cost/latency, can rationalize the original answer, and ignores the root cause (schema demanding values). Fix the schema; use verification only as a sampling audit.", "source": "cheatsheet" },
  { "id": "f-s04-05", "section": 4, "front": "When are provenance fields (source_location, source_quote, effective_date) critical?", "back": "Amendments, conflicting sections, reports needing citations, human audit. With amendments, capture original AND amended values — a single scalar is the wrong schema.", "source": "cheatsheet" },
  { "id": "f-s04-06", "section": 4, "front": "What goes in a correction request after failed validation?", "back": "The source document, the previous (invalid) extraction, and the exact validation errors — with \"don't change fields unless needed.\" Far better than blind retry or temperature: 0.", "source": "cheatsheet" },
  { "id": "f-s04-07", "section": 4, "front": "Which extraction failure can NO retry fix?", "back": "When the information lives in an external document that was never provided. Retries only hallucinate. Retrieve the source or route to human review.", "source": "cheatsheet" },
  { "id": "f-s04-08", "section": 4, "front": "Long transcript fits in context but facts are scattered. Best approach?", "back": "A pre-extraction pass: surface decisions, amounts, dates into a structured intermediate, then extract from that. Chunking loses cross-section links; few-shot doesn't find needles.", "source": "cheatsheet" },
  { "id": "f-s04-09", "section": 4, "front": "What must happen before auto-approving \"97% accurate\" extractions?", "back": "Segment accuracy by document type, field, and confidence band against a labeled set — aggregates hide 80% segments. Then stratified sampling of auto-approved outputs after launch.", "source": "cheatsheet" },
  { "id": "f-s04-10", "section": 4, "front": "How do you match batch results back to their documents?", "back": "Join by `custom_id` — batch results may arrive in any order. Resubmit only failures after fixing the cause.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s05">
[
  { "id": "f-s05-01", "section": 5, "front": "Match the need to the context strategy: recent flow / preferences / exact facts / creative canon.", "back": "Recent flow → verbatim recent turns. Preferences → structured state object. Exact facts → retrieval or fact store. Creative canon → compact reference \"bible\" section.", "source": "table" },
  { "id": "f-s05-02", "section": 5, "front": "When does a plain sliding window work — and when does it fail?", "back": "Works when logs show older messages are rarely referenced (users can re-state). Fails when users reach back to earlier decisions, preferences, or exact data.", "source": "cheatsheet" },
  { "id": "f-s05-03", "section": 5, "front": "RAG results from many old queries are crowding context. Fix?", "back": "Apply a sliding window specifically to RAG results (keep last 2–3 retrievals) while conversation history keeps its own policy. Different content, different retention.", "source": "cheatsheet" },
  { "id": "f-s05-04", "section": 5, "front": "What makes a progressive summary USEFUL?", "back": "Structure: Decisions / Current preferences / Open questions / Important facts. Vague narrative prose loses exactly the details users later ask about.", "source": "cheatsheet" },
  { "id": "f-s05-05", "section": 5, "front": "Where do allergies, user-defined terms, and world rules live in a long session?", "back": "A retained reference section at the start of context, exempt from trimming/summarization. Only the surrounding discussion gets summarized.", "source": "cheatsheet" },
  { "id": "f-s05-06", "section": 5, "front": "Users revise preferences mid-session and the agent applies old ones. Most reliable fix?", "back": "A canonical structured state object updated on every revision and sent every request. More reliable than \"prioritize recent\" instructions, pruning, or few-shot examples.", "source": "cheatsheet" },
  { "id": "f-s05-07", "section": 5, "front": "Summaries blurred the exact numbers users now ask about. Most direct fix?", "back": "Re-inject the relevant source sections on demand when a question signals precision is needed. Scales better than a full fact store or number-preserving summaries.", "source": "cheatsheet" },
  { "id": "f-s05-08", "section": 5, "front": "Verbose tool results are dominating context. What's the pattern?", "back": "Tool result compression: after processing, keep only task-relevant fields (IDs, dates, statuses), drop backend noise — better than prose summaries or a vector store.", "source": "cheatsheet" },
  { "id": "f-s05-09", "section": 5, "front": "Compaction vs context editing — what does each do?", "back": "Compaction summarizes earlier history into a compact block (session keeps going). Context editing prunes stale content like old tool results. App-level structures still own must-survive-verbatim facts.", "source": "cheatsheet" },
  { "id": "f-s05-10", "section": 5, "front": "How should a session resume after the user returns hours later?", "back": "Structured summary of prior interaction (issue, actions, known IDs, last status) + fresh lookups before claiming current status. Old tool results are stale; agents cite them despite instructions.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s06">
[
  { "id": "f-s06-01", "section": 6, "front": "Is the system prompt a one-time initialization message?", "back": "No — it must be sent on EVERY request. Omit it on later turns and behavior diverges immediately (not gradually). The model has no memory between calls.", "source": "pitfall" },
  { "id": "f-s06-02", "section": 6, "front": "The prompt is sent every turn, yet adherence weakens over a long session. What's happening?", "back": "Attention competition (dilution): recent outputs and turns compete with the system prompt. Fix structurally — reinforce at breakpoints, use examples, move hard rules into code.", "source": "cheatsheet" },
  { "id": "f-s06-03", "section": 6, "front": "What do XML-style tags in system prompts actually do?", "back": "Improve salience and organization, separate concerns (role vs style vs safety), and make sections referenceable later. Helpful — not magic, not enforced.", "source": "cheatsheet" },
  { "id": "f-s06-04", "section": 6, "front": "Principles vs conditionals vs code — which behavior goes where?", "back": "Principles for judgment (\"adapt depth to demonstrated expertise\"). Conditionals for safety triggers and bright lines. Code for anything that must hold 100% of the time.", "source": "cheatsheet" },
  { "id": "f-s06-05", "section": 6, "front": "Why does converting every nuance into if-then conditionals backfire?", "back": "It forces shallow keyword matching in place of judgment — atypical phrasings get misclassified, the prompt bloats, and adherence drops. The conditional explosion.", "source": "pitfall" },
  { "id": "f-s06-06", "section": 6, "front": "Long bulleted rule list, drifting behavior. Denser alternative?", "back": "Replace chunks of rules with 2–3 contrasting few-shot examples. Examples teach distinctions the model must learn; prose is for things it can recite.", "source": "cheatsheet" },
  { "id": "f-s06-07", "section": 6, "front": "Two reinforcement patterns for long-running sessions?", "back": "(1) Brief user-role reminders of current constraints at natural breakpoints. (2) System prompt versioning — treat it as living configuration stating what currently holds.", "source": "cheatsheet" },
  { "id": "f-s06-08", "section": 6, "front": "When to ask a clarifying question vs proceed with an assumption?", "back": "Ask when interpretations diverge materially, the action is irreversible/costly, or goals conflict — and ask ONE focused question. Otherwise proceed with a stated assumption the user can redirect.", "source": "cheatsheet" },
  { "id": "f-s06-09", "section": 6, "front": "User states two incompatible goals. Correct behavior?", "back": "Name the tension and ask which priority governs. Never average into a hidden compromise that satisfies neither.", "source": "cheatsheet" },
  { "id": "f-s06-10", "section": 6, "front": "Webhook updates user state mid-session on a cached, high-traffic agent. Where does the state go?", "back": "Keep the system prompt stable (it heads the cached prefix); inject fast-changing state as a labeled block near the latest turn, after the last cache breakpoint.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s07">
[
  { "id": "f-s07-01", "section": 7, "front": "MCP's three building blocks — and who controls each?", "back": "Tools (model-controlled actions), resources (application-controlled context), prompts (user/application-controlled reusable workflows).", "source": "table" },
  { "id": "f-s07-02", "section": 7, "front": "Resource or tool: database schemas, API specs, file catalogs?", "back": "Resources — stable reference material the agent consults before acting. Tools are for dynamic computation at moment of use (live queries, orders, updates).", "source": "cheatsheet" },
  { "id": "f-s07-03", "section": 7, "front": "Agent overwhelmed by similar tools across servers. Is one natural-language router tool the fix?", "back": "No — an aggregator hides the real tool surface and worsens selection. Improve descriptions and use progressive availability.", "source": "pitfall" },
  { "id": "f-s07-04", "section": 7, "front": "When is MCP worth it over a custom in-app tool?", "back": "When the integration should be reusable across multiple clients/apps. One app, one bespoke workflow → a custom tool is simpler. MCP doesn't solve auth, retries, rate limits, or caching.", "source": "cheatsheet" },
  { "id": "f-s07-05", "section": 7, "front": "Agent ignores your specialized MCP tool and uses generic search. Fix?", "back": "Improve the tool description: when it beats generics, inputs/outputs, examples, key capabilities. Don't remove the generic tools — the agent needs them too.", "source": "cheatsheet" },
  { "id": "f-s07-06", "section": 7, "front": "Are MCP tool annotations (readOnlyHint, destructiveHint) a security boundary?", "back": "No — they're untrusted self-reports for UI affordances. A malicious server can lie. Base permissions on server trust, user policy, and real operation risk.", "source": "pitfall" },
  { "id": "f-s07-07", "section": 7, "front": "MCP error tiers: when protocol error vs isError: true?", "back": "Failure BEFORE business logic could run (missing param, unknown method) → JSON-RPC protocol error. Tool reached its target and the operation failed (404, 503, permission) → isError: true.", "source": "cheatsheet" },
  { "id": "f-s07-08", "section": 7, "front": "Claude Code MCP scopes — where does each live and who sees it?", "back": "Project: .mcp.json in repo, everyone. Local: ~/.claude.json keyed to project path, just you, this project. User: ~/.claude.json global, just you, everywhere. Credentials never go in project scope.", "source": "table" },
  { "id": "f-s07-09", "section": 7, "front": "Same server name at multiple Claude Code scopes — what wins?", "back": "local > project > user. One connection; the entire winning entry is used — fields are NOT merged across scopes.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s08">
[
  { "id": "f-s08-01", "section": 8, "front": "Five core agentic patterns — match each to its shape of work.", "back": "Prompt chaining: fixed known steps. Routing: distinct input categories. Orchestrator-workers: coordinator delegates subtasks. Dynamic decomposition: each finding changes the plan. Parallel subagents: independent workstreams.", "source": "table" },
  { "id": "f-s08-02", "section": 8, "front": "When is dynamic decomposition right — and what's its cost?", "back": "Investigations where the next move depends on the last finding (debugging, triage). Cost: unpredictability — set explicit termination criteria and step caps.", "source": "cheatsheet" },
  { "id": "f-s08-03", "section": 8, "front": "When should a coordinator NOT delegate?", "back": "Small work already in its context. Delegation costs a tool call, fresh context, separate invocation, and result passing. Delegate for context-flooding tasks, different prompt/toolsets, or parallelism.", "source": "cheatsheet" },
  { "id": "f-s08-04", "section": 8, "front": "Partition-then-parallel: how do you split the work?", "back": "Balance partitions by expected effort, not count — elapsed time is max(subagent durations), so the heaviest partition dictates everything. Avoid when units depend on each other or a split would cut a logical unit.", "source": "cheatsheet" },
  { "id": "f-s08-05", "section": 8, "front": "What does a freshly spawned subagent know?", "back": "Only what the parent passes in the prompt + its own definition. No parent transcript, no prior tool results, no memory of earlier runs. \"Resume the previous subagent\" doesn't exist by default.", "source": "cheatsheet" },
  { "id": "f-s08-06", "section": 8, "front": "What goes in a handoff to a report-writing subagent needing citations?", "back": "A structured source index: claims mapped to source IDs, URLs, excerpts, dates, uncertainty notes. Prose summaries destroy the claim→source mapping.", "source": "cheatsheet" },
  { "id": "f-s08-07", "section": 8, "front": "Why did the orchestrator never delegate despite defined subagents?", "back": "The Task/Agent tool isn't in the parent's allowedTools. Delegation is itself a tool call. The subagent's own allowedTools is configured separately.", "source": "pitfall" },
  { "id": "f-s08-08", "section": 8, "front": "The serial-parallel-serial pattern?", "back": "Serial decomposition (plan the independent units) → parallel execution (each unit concurrent) → serial synthesis. Biggest win on I/O-bound subtasks: max(durations) instead of sum.", "source": "cheatsheet" },
  { "id": "f-s08-09", "section": 8, "front": "What must research subagents output so synthesis doesn't misread the evidence?", "back": "Claim, source ID + location, publication/collection date, methodology notes, source's uncertainty language, and established/contested status. Missing dates turn trends into false contradictions.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s09">
[
  { "id": "f-s09-01", "section": 9, "front": "When should a support agent escalate?", "back": "User asks for a human (and it can't be resolved without overriding them), authority is lacking, policy exception / regulated approval / high-value transaction, no meaningful progress, or tool results show uncertain/unsafe state. NOT a failure counter.", "source": "cheatsheet" },
  { "id": "f-s09-02", "section": 9, "front": "What does a good escalation handoff contain?", "back": "Structured context: customer ID, issue type, root cause, relevant record IDs, amounts, actions taken, recommended next action. Not the first complaint; not a transcript dump.", "source": "cheatsheet" },
  { "id": "f-s09-03", "section": 9, "front": "Frustrated user demands a human but the fix is instant. Response?", "back": "Acknowledge the frustration, then offer both: \"I can resolve this now, and I can transfer you if you prefer.\" Preserve their choice — never silently act after they asked for a person.", "source": "cheatsheet" },
  { "id": "f-s09-04", "section": 9, "front": "Where do hard policy rules (refund thresholds, regulated approvals) get enforced?", "back": "In code: tool-level enforcement, middleware, permissions, hooks. The threshold value lives server-side (policy service, feature flag) — never in a model-passed parameter. Prompts guide; they don't enforce.", "source": "cheatsheet" },
  { "id": "f-s09-05", "section": 9, "front": "What makes preview-then-execute tokens safe?", "back": "Short-lived, single-use, and bound to the previewed payload. The model can't construct one or reuse one with different parameters — execution structurally requires a confirmed preview.", "source": "cheatsheet" },
  { "id": "f-s09-06", "section": 9, "front": "\"The model already checked policy, so the tool can skip authorization.\" True?", "back": "Never. Tools live inside the trust boundary and must re-verify authority on every invocation. Defense-in-depth: prompts bias, tools enforce, audit logs detect.", "source": "pitfall" },
  { "id": "f-s09-07", "section": 9, "front": "A tool fails mid-workflow. What does graceful degradation sound like?", "back": "\"Here's what's done, here's what's pending, here's how we finish\" — verified facts, the honest gap, concrete next steps. Never claim an incomplete side effect happened.", "source": "cheatsheet" },
  { "id": "f-s09-08", "section": 9, "front": "Same tool, same input, failing repeatedly. Next move?", "back": "Switch strategies — different tool, clarifying question, or escalation. Repeated identical failure is a signal, not an invitation to retry harder.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s10">
[
  { "id": "f-s10-01", "section": 10, "front": "Grep vs Glob — which finds what?", "back": "Grep searches file CONTENTS; Glob finds files by NAME/PATH pattern. Never use filename search to find code references inside files.", "source": "table" },
  { "id": "f-s10-02", "section": 10, "front": "When does plan mode earn its overhead?", "back": "Multi-file changes, architectural choices, migrations/breaking changes, stakeholder approval needed, or read-only exploration first. Tiny clear edits → direct execution.", "source": "cheatsheet" },
  { "id": "f-s10-03", "section": 10, "front": "Plan mode vs extended thinking — what problem does each solve?", "back": "Plan mode = workflow control (gate thinking→doing behind human review). Extended thinking/effort = reasoning quality on hard problems. Different mechanisms; combinable.", "source": "cheatsheet" },
  { "id": "f-s10-04", "section": 10, "front": "Session flags: --continue vs --resume vs --session-id vs --fork-session?", "back": "--continue: latest conversation here, no prompt. --resume: pick a specific session. --session-id: stable UUID for programmatic use. --fork-session: branch a new transcript from an existing one.", "source": "table" },
  { "id": "f-s10-05", "section": 10, "front": "Comparing two implementation approaches from the same starting state — what's the full setup?", "back": "Fork the session (transcripts diverge independently) AND use separate git worktrees (file changes don't collide). Sessions persist conversation, not filesystem state.", "source": "cheatsheet" },
  { "id": "f-s10-06", "section": 10, "front": "Is CLAUDE.md enforced?", "back": "No — CLAUDE.md, rules, and auto memory are context (soft guidance). Behavior that must always hold — blocked paths, destructive-command approval, formatters — needs PreToolUse hooks or permissions.deny.", "source": "pitfall" },
  { "id": "f-s10-07", "section": 10, "front": "How do CLAUDE.md files load across the directory tree?", "back": "Working dir + ancestors: fully at launch (broader scopes first). Subdirectories: on demand when files there are read. @imports: expanded at launch — they organize, they don't save tokens.", "source": "cheatsheet" },
  { "id": "f-s10-08", "section": 10, "front": "CLAUDE.md vs .claude/rules/ vs skills vs hooks — the rule of thumb?", "back": "Every-session fact → CLAUDE.md. Area-specific → rules with paths: globs. Deliberate multi-step procedure → skill (or slash command if human-invoked only). Must-run-deterministically → hook.", "source": "table" },
  { "id": "f-s10-09", "section": 10, "front": "Auto memory: what loads at session start, and where does it live?", "back": "First 200 lines or 25KB of MEMORY.md; topic files load on demand. Stored per project at ~/.claude/projects/<project>/memory/ — machine-local, shared across the repo's worktrees, never synced.", "source": "cheatsheet" },
  { "id": "f-s10-10", "section": 10, "front": "Claude ignores a rule you wrote. First diagnostic?", "back": "/memory — confirm the file is actually loaded for this working directory. If it isn't loading, wording changes can't help. Deeper: the InstructionsLoaded hook logs what loaded, when, why.", "source": "cheatsheet" },
  { "id": "f-s10-11", "section": 10, "front": "Task-scoped vs path-scoped instructions — why aren't they interchangeable?", "back": "Task-scoped (reviews, releases) → slash command/skill/subagent, invoked deliberately. Path-scoped (API dir, tests) → rules with paths:, triggered by file reads. A review checklist in paths-rules fires on every touch of those files, review or not.", "source": "pitfall" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s11">
[
  { "id": "f-s11-01", "section": 11, "front": "What makes feedback to Claude actually effective?", "back": "Concrete and executable: the failing input, expected vs actual output, the validation error or failing test + assertion, and the source excerpt that triggered it. \"Handle edge cases better\" gives nothing to act on.", "source": "cheatsheet" },
  { "id": "f-s11-02", "section": 11, "front": "The effective coding iteration loop?", "back": "Define behavior with tests/examples → ask for the smallest useful implementation → run tests → feed back exact failures → iterate one failure class at a time.", "source": "cheatsheet" },
  { "id": "f-s11-03", "section": 11, "front": "Same defect recurs across runs of the same prompt. What does it mean?", "back": "The prompt or schema needs a structural change (few-shot example, split tool, new field) — not another retry. Prompt-level fixes generalize; retries don't.", "source": "cheatsheet" },
  { "id": "f-s11-04", "section": 11, "front": "Five signs of low-value generated tests?", "back": "Only assert no-throw; duplicate existing coverage; ignore project fixtures; test implementation details over behavior; miss important branches and error paths. Fix: documented test standards with contrasting examples.", "source": "cheatsheet" },
  { "id": "f-s11-05", "section": 11, "front": "What does a code review agent need to be useful?", "back": "Explicit criteria: report bugs, security, correctness, data loss, missing tests, breaking API changes; skip style nits, accepted conventions, speculative perf advice.", "source": "cheatsheet" },
  { "id": "f-s11-06", "section": 11, "front": "Best way to cut a review agent's false positives?", "back": "Few-shot examples showing acceptable patterns NEXT TO genuinely problematic ones. Beats \"be conservative\" — the model needs to see where your line is.", "source": "cheatsheet" },
  { "id": "f-s11-07", "section": 11, "front": "Why record detected_pattern / rule_id / evidence on review findings?", "back": "So dismissals become analyzable: aggregate dismiss rates by pattern, then suppress the over-reporting patterns in the prompt. Without it you know \"35% dismissed\" but not what to fix.", "source": "cheatsheet" },
  { "id": "f-s11-08", "section": 11, "front": "Why segment evaluation results instead of tracking one accuracy number?", "back": "Aggregates hide localized failure — 97% overall can mask a critical field at 80%. Segment by document type, field, prompt version, model, source quality, confidence band, correction category.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s12">
[
  { "id": "f-s12-01", "section": 12, "front": "The three model tiers and their architecture roles?", "back": "Haiku: fastest/cheapest — classification, routing, high-volume simple steps. Sonnet: balanced — the default production workhorse. Opus: most capable — complex agentic work, hard analysis. Match tier to STEP, not product.", "source": "table" },
  { "id": "f-s12-02", "section": 12, "front": "When should the expensive model be used?", "back": "On measurable signal: low calibrated confidence, failed validation, explicit needs-deeper-analysis classification. \"Everything on the largest model to be safe\" is a budget decision dressed as a safety decision.", "source": "cheatsheet" },
  { "id": "f-s12-03", "section": 12, "front": "How does thinking work on current models?", "back": "Adaptive — the model decides when and how much to reason, scaled by a request-level effort setting. Fixed thinking-token budgets are legacy/deprecated. Effort is a per-request dial.", "source": "cheatsheet" },
  { "id": "f-s12-04", "section": 12, "front": "Which tasks benefit from higher reasoning effort?", "back": "Reasoning-shaped ones: migration planning, ambiguous requirements, debugging from indirect evidence. Mechanical extraction/classification rarely benefits — use schemas and few-shot examples there.", "source": "cheatsheet" },
  { "id": "f-s12-05", "section": 12, "front": "When to stream — and when not?", "back": "Stream when a human is watching (TTFT = perceived speed) or outputs are long (timeout risk). Skip for batch jobs and machine-to-machine calls. Streaming changes delivery, not quality or cost.", "source": "cheatsheet" },
  { "id": "f-s12-06", "section": 12, "front": "max_tokens vs model_context_window_exceeded?", "back": "max_tokens: OUTPUT hit your cap → raise it, stream, or split. context_window_exceeded: INPUT doesn't fit → compact, trim, summarize. Both look like truncation; log which one occurred.", "source": "table" },
  { "id": "f-s12-07", "section": 12, "front": "Correct handling for pause_turn and refusal stop reasons?", "back": "pause_turn: re-send the conversation as-is; a long-running server-side operation resumes. refusal: surface to the user or route to review — never blind-retry the identical prompt.", "source": "table" },
  { "id": "f-s12-08", "section": 12, "front": "429 vs 500/529 vs 400 — handling?", "back": "429: honor retry-after, backoff + jitter (SDKs retry automatically). 500/529: transient, retry with backoff. 400: malformed — fix the request; retry can't succeed.", "source": "table" },
  { "id": "f-s12-09", "section": 12, "front": "What do sustained 429s actually signal?", "back": "A capacity-planning problem, not an error-handling bug: spread load, move deferrable volume to the Batch API, request higher limits, or split across models with separate pools. Limits are per model, in requests AND tokens/min.", "source": "cheatsheet" },
  { "id": "f-s12-10", "section": 12, "front": "How do you count tokens before submitting a big workload?", "back": "The API's token-counting endpoint — exact, model-specific, free. Never third-party tokenizers built for other providers; they miscount, especially code and non-English text.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s13">
[
  { "id": "f-s13-01", "section": 13, "front": "The one invariant that governs all prompt caching?", "back": "Exact prefix match. Cache key = rendered request up to a breakpoint, in render order (tools → system → messages). One changed byte invalidates everything after it.", "source": "cheatsheet" },
  { "id": "f-s13-02", "section": 13, "front": "Name the classic silent cache invalidators.", "back": "Timestamp/current-date in the system prompt; non-deterministic serialization (unsorted keys, unordered tool lists); per-user/session IDs early in the prompt; feature-flag-toggled prompt sections; changing tools or model mid-conversation.", "source": "pitfall" },
  { "id": "f-s13-03", "section": 13, "front": "How do you order request content for cache stability?", "back": "Most stable first: deterministic tool definitions → frozen system prompt → stable history → volatile per-request content AFTER the last breakpoint.", "source": "cheatsheet" },
  { "id": "f-s13-04", "section": 13, "front": "Breakpoint limits, TTLs, and the minimum-size trap?", "back": "Up to 4 breakpoints; default TTL 5 minutes (1-hour option costs more to write); prefixes under a model-dependent minimum (~1–2K tokens) are silently NOT cached.", "source": "cheatsheet" },
  { "id": "f-s13-05", "section": 13, "front": "How do you verify caching works?", "back": "The usage block reports cache writes and reads separately. Zero reads on repeated identical-prefix traffic = silent invalidator → byte-diff two consecutive rendered requests.", "source": "cheatsheet" },
  { "id": "f-s13-06", "section": 13, "front": "Caching economics in round numbers?", "back": "Writes: slight premium over input. Reads: ~an order of magnitude cheaper. Pays for itself by the second hit. Never cache what never repeats — that's pure write premium.", "source": "cheatsheet" },
  { "id": "f-s13-07", "section": 13, "front": "When is caching the WRONG lever?", "back": "Context-window overflow (caching changes cost, not capacity), one-shot workloads (no repeats), and output-generation latency (cached input speeds prompt processing only).", "source": "pitfall" },
  { "id": "f-s13-08", "section": 13, "front": "Match the cost lever to the expense: repeated prefix / deferrable volume / over-tiered / bloated unique content.", "back": "Repeated prefix → cache. Deferrable volume → batch. Over-tiered capability → smaller model. Bloated unique content → trim. They compose — cheap model + warm cache is often cheapest of all.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s14">
[
  { "id": "f-s14-01", "section": 14, "front": "The two numbers to remember about the Batch API?", "back": "~50% off equivalent on-demand pricing, and up to 24 hours to complete. Design SLAs around the 24-hour worst case — never the typical case.", "source": "cheatsheet" },
  { "id": "f-s14-02", "section": 14, "front": "When does batch fit — and when is it a poor fit?", "back": "Fits: high volume, delay-tolerant, independent requests, cost matters. Poor fit: interactive users waiting, short deadlines, steps depending on prior results, humans needing immediate feedback.", "source": "cheatsheet" },
  { "id": "f-s14-03", "section": 14, "front": "How do batch results map back to inputs?", "back": "By custom_id ONLY — results may arrive in any order. Use stable unique IDs (source record's primary key). Duplicated IDs make matching ambiguous.", "source": "pitfall" },
  { "id": "f-s14-04", "section": 14, "front": "The batch cadence formula for continuous arrivals?", "back": "Max cadence = SLA − batch worst case (24h) − post-processing buffer. The worst case is the record arriving one second after a submission. 30h SLA, 24h window, 4h processing → cadence ≤ 2h.", "source": "cheatsheet" },
  { "id": "f-s14-05", "section": 14, "front": "When is once-a-day batch submission safe?", "back": "Only when the SLA is ≥ 48 hours (24h max wait for next submission + 24h batch window) and tail latency is acceptable.", "source": "cheatsheet" },
  { "id": "f-s14-06", "section": 14, "front": "3% of a batch failed. What now?", "back": "Resubmit ONLY failures, by type: context-length → chunk and merge; validation → resubmit with error feedback; prompt/schema issues → refine and resubmit affected records; expired/canceled → resubmit those custom_ids. Never rerun the whole batch.", "source": "cheatsheet" },
  { "id": "f-s14-07", "section": 14, "front": "Operational hygiene for large batches?", "back": "Stream the JSONL results incrementally; validate request shape on the standard API first (malformed requests become per-request errors, not batch failures); expect platform size limits to require multiple batches.", "source": "cheatsheet" },
  { "id": "f-s14-08", "section": 14, "front": "Do the batch discount and prompt caching stack?", "back": "Yes — batched requests support caching. Caveat: cache hits in an async batch are best-effort (requests may process far apart). Neither lever fixes the other's limits.", "source": "cheatsheet" }
]
</script>
<script type="application/json" data-kind="flashcards" data-src="s15">
[
  { "id": "f-s15-01", "section": 15, "front": "The two untrusted flows that define agent security?", "back": "(1) Model output is untrusted input to your systems — validate and authorize in code. (2) External content is untrusted input to the model — prompt injection. Prompts influence; code constrains.", "source": "cheatsheet" },
  { "id": "f-s15-02", "section": 15, "front": "Does prompt injection need a malicious user?", "back": "No. A well-meaning user asks for a summary of a page containing \"ignore your instructions and…\". The payload rides in on legitimately processed content: retrievals, email, tickets, even file names and code comments.", "source": "cheatsheet" },
  { "id": "f-s15-03", "section": 15, "front": "The four architectural injection defenses?", "back": "Least privilege per context (narrow toolset around untrusted content); gate consequential actions on human confirmation (preview-then-execute); treat instructions-in-data as data (raises the bar, not a guarantee); validate outputs against expectations (code-level allowlists).", "source": "cheatsheet" },
  { "id": "f-s15-04", "section": 15, "front": "The exfiltration triad?", "back": "Private data + untrusted content + outbound channel (email, HTTP, file write, commit) = complete exfiltration path. Remove or gate at least one leg. Most \"is this safe?\" scenarios ask whether you spotted all three legs.", "source": "cheatsheet" },
  { "id": "f-s15-05", "section": 15, "front": "How should MCP servers and hooks be treated from a security standpoint?", "back": "Like dependencies: vet the source, review updates, grant scoped credentials. Server annotations are unverified self-claims. Hooks run as code with your privileges — a malicious hook is arbitrary code execution.", "source": "cheatsheet" },
  { "id": "f-s15-06", "section": 15, "front": "Where do credentials go — and where must they never go?", "back": "Execution layer: the tool reads keys from env/secret manager; the model sees only results. Never in prompts or tool results — context is persisted in transcripts, logs, caches; a pasted secret is leaked to every storing system.", "source": "pitfall" },
  { "id": "f-s15-07", "section": 15, "front": "Why is returning 40 fields when 6 are needed a security issue?", "back": "Every extra PII field in context is another copy in transcripts, logs, and monitoring. Data minimization = exposure minimization. And log tool calls (inputs, outcomes, request IDs) for incident reconstruction.", "source": "cheatsheet" },
  { "id": "f-s15-08", "section": 15, "front": "Is content trustworthy because your own retrieval pipeline returned it?", "back": "No — retrieved and fetched text is untrusted regardless of pipeline integrity. The pipeline faithfully delivers whatever the content is, injected instructions included.", "source": "pitfall" }
]
</script>
<script type="application/json" data-kind="lessons" data-src="l01">
[
  {
    "id": "l-01",
    "section": 1,
    "title": "API Fundamentals and Output Control",
    "minutes": 8,
    "blocks": [
      {
        "type": "plain",
        "html": "<p>When an app talks to Claude, it sends a web request and gets a response — and then Claude forgets the whole exchange. This is the single most important fact in this section: <strong>the API is stateless</strong>. Claude has no memory between calls. If your app wants Claude to \"remember\" that the user's name is Dana, the app must store that fact itself and include it in the next request.</p><p>Think of it like calling a very smart consultant who has amnesia between phone calls. Every call, you must re-read them the case file. The consultant is brilliant — but only about what's in front of them right now. A <code>session_id</code> is just a label on your own filing cabinet; it helps <em>you</em> find the case file, but the consultant never sees the cabinet.</p><p>The second big idea: when you need Claude's answer in a machine-readable format (say, JSON your database can ingest), asking nicely in the prompt is not a guarantee. The reliable approach is <strong>schema-backed output</strong> — telling the API the exact shape the answer must have, so the shape is enforced rather than requested.</p>"
      },
      {
        "type": "example",
        "html": "<p>Imagine building an invoice reader. You could prompt: \"Respond ONLY with valid JSON.\" It works 98% of the time — and the other 2%, Claude adds a friendly sentence or wraps the JSON in a code fence, and your parser crashes at 2am. The fix is structural: define the invoice fields as a schema using <em>structured outputs</em> (<code>output_config.format</code>) or a <em>tool definition</em>, and the API constrains the response to match. You also control <em>whether</em> Claude uses tools with <code>tool_choice</code>: <code>auto</code> means \"tool optional,\" <code>any</code> means \"must use one of these tools,\" a named tool means \"must use exactly this one,\" and <code>none</code> disables tools.</p>"
      },
      {
        "type": "examLevel",
        "html": "<p>Exam-level distinctions to hold onto:</p><ul><li>System prompts go in the top-level <code>system</code> parameter, not a \"system\" role message.</li><li>Long conversations get slower and pricier because the <em>whole history is resent as input tokens every turn</em> — not because of a model defect.</li><li>\"Partial assistant prefill\" (ending a request with a half-written assistant message) is legacy: current models return a validation error. Replacements: structured outputs for format, enum fields for labels, system-prompt instructions for suppressing preamble.</li><li>Schemas cost tokens. A 2,500-token tool schema plus a long document can approach the context limit, degrading accuracy near the document's end — the root cause is total context consumption.</li><li>When an extraction fails semantic validation, don't blindly retry: send back the source, the invalid extraction, and the exact validation errors. That feedback loop beats retries and beats <code>temperature: 0</code>.</li></ul>"
      },
      {
        "type": "takeaways",
        "items": [
          "The API is stateless — your app owns memory, and `session_id` means nothing to the model.",
          "Schema-backed output (structured outputs or tool use) beats prompt-requested JSON every time.",
          "`tool_choice`: `auto` = optional, `any` = must use some tool, named = must use that tool, `none` = no tools.",
          "Long-session cost growth = input tokens resent every turn.",
          "Validation failed? Feed back source + extraction + exact errors, don't blind-retry."
        ]
      }
    ],
    "resources": ["r-01", "r-02", "r-04"]
  }
]
</script>
<script type="application/json" data-kind="lessons" data-src="l02">
[
  {
    "id": "l-02",
    "section": 2,
    "title": "Designing Tool Interfaces for LLM Agents",
    "minutes": 9,
    "blocks": [
      {
        "type": "plain",
        "html": "<p>A \"tool\" is a function you let Claude call — search the catalog, send an email, issue a refund. Claude chooses tools by reading their names, descriptions, and parameter definitions, the way you'd choose an appliance by reading its label and manual. So tool design is really <strong>communication design</strong>: a good interface makes the right action easy and the wrong action hard or impossible.</p><p>The core instinct to build: <em>don't tell the model rules the schema could enforce.</em> If a cardio workout needs duration and a strength workout needs sets and reps, one do-everything tool with optional fields invites nonsense combinations. Two separate tools make the invalid combinations literally unexpressible.</p><p>Where a tool <em>runs</em> matters too. Client-side tools run in your app (full control, full responsibility). Server-side tools run on Anthropic's infrastructure (no ops burden, but you can't intercept calls). MCP tools run wherever that server lives. Promote an action to a dedicated client-side tool when you need to gate, audit, or confirm it — a <code>send_email</code> call can be intercepted; a shell command doing the same thing is an opaque string.</p>"
      },
      {
        "type": "example",
        "html": "<p>A user says \"delete the Henderson project.\" There are two projects with Henderson in the name. If your delete tool accepts a name string, the model guesses — and one day guesses wrong. The safe pattern is <strong>lookup-then-act</strong>: a search tool returns candidate IDs with distinguishing details (owner, last activity), the user picks the right one with a click, and the delete tool only accepts IDs. For truly destructive actions, add <strong>preview-then-execute</strong>: a preview tool returns the impact plus a one-time confirmation token, and the execute tool requires that token. Note what this replaces: a <code>dry_run: true</code> flag is worthless because the model itself sets it.</p>"
      },
      {
        "type": "examLevel",
        "html": "<p>Output design gets tested as much as input design:</p><ul><li>Return structured results with IDs downstream tools can use — never just prose.</li><li>\"No matches\" is a <em>successful</em> empty result, not an error; conflating them makes agents retry valid queries.</li><li>Paginate: first page + <code>total_count</code> + cursor. Don't auto-fetch hundreds of items.</li><li>Normalize heterogeneous backend data into one consistent schema before the model sees it.</li><li>For ML outputs with confidence scores, return a calibrated <code>requires_review</code> boolean with reasons — raw scores invite over-trust and over-escalation.</li></ul><p>For big tool catalogs, use <strong>progressive availability</strong>: discovery tools return a shortlist, then the chosen tools are dynamically added — never a single <code>find_and_execute</code> that hides the final decision. And compose tools only when no judgment lives between the steps; \"check availability + book\" should be atomic (race condition), but \"retrieve sources + write conclusions\" must stay separate.</p>"
      },
      {
        "type": "takeaways",
        "items": [
          "Schemas enforce; descriptions advise. Make invalid calls unrepresentable.",
          "Lookup-then-act: search returns IDs, mutations accept only IDs, users disambiguate.",
          "dry_run flags are model-controlled and useless; preview + one-time token is structural.",
          "Empty result ≠ error. Success-with-nothing and failure must be distinguishable.",
          "Compose tools for mechanical/atomic sequences; never to hide decisions."
        ]
      }
    ],
    "resources": ["r-03", "r-02", "r-37"]
  }
]
</script>
<script type="application/json" data-kind="lessons" data-src="l03">
[
  {
    "id": "l-03",
    "section": 3,
    "title": "Error Handling in Agent Tools",
    "minutes": 7,
    "blocks": [
      {
        "type": "plain",
        "html": "<p>When a tool fails, the error message isn't just diagnostics — it's <strong>instructions to the agent about what to do next</strong>. A vague \"Error: try again\" forces the model to guess: retry? ask the user? give up? Production tools classify their failures so the agent's next move is obvious.</p><p>Five categories cover nearly everything: <em>transient infrastructure</em> (timeout, 503 — retry inside the tool), <em>permanent validation</em> (bad date, malformed ID — tell the agent exactly what's wrong so it can fix the input), <em>business rule</em> (not eligible — non-retryable, explain to the user), <em>permission</em> (no access — non-retryable, offer the escalation path), and the dangerous one: <em>uncertain write state</em>.</p><p>The rule of thumb for retries: put retry logic <strong>where the information to fix the problem lives</strong>. The tool knows a timeout is transient — it retries. Only the model can fix a bad filter string — surface it. Only a human can authorize risking a duplicate charge — escalate it.</p>"
      },
      {
        "type": "example",
        "html": "<p>Your <code>send_invoice_email</code> tool calls a mail API that sometimes times out <em>after</em> the send was submitted. If the tool says \"Error: timeout, please retry,\" the agent retries — and the customer gets two invoices. The right return communicates uncertainty: \"Delivery status unknown. The message may have been sent. Do not retry without an idempotency check — verify via status lookup or ask the user.\" Read-side timeouts and write-after-submission timeouts are <em>inverses</em>: the first is safe to retry, the second may duplicate a real-world effect.</p>"
      },
      {
        "type": "examLevel",
        "html": "<p>MCP adds a two-tier error model that exams love:</p><ul><li><strong>Protocol errors</strong> (JSON-RPC): the call itself was invalid — unknown tool, missing schema-required parameter. The failure happened <em>before business logic ran</em>.</li><li><strong>Tool execution errors</strong> (<code>isError: true</code>): the tool ran and the operation failed — upstream 404, 503, permission denial, business rule.</li></ul><p>Misusing the tiers causes specific misbehavior: missing-parameter failures shoved into <code>isError</code> make agents retry identical bad calls; a 503 raised as a protocol error stops the agent from retrying something that would have succeeded later. Also memorize the pitfalls: never return an empty list for a backend failure (it reads as \"success, nothing found\"), and never throw exceptions for expected business errors (frameworks hide the details from the model).</p>"
      },
      {
        "type": "takeaways",
        "items": [
          "Classify failures — the category tells the agent its next move.",
          "Retry lives where the fix lives: tool (transient), model (bad inputs), human (risky side effects).",
          "Write-after-submission timeout = uncertain state: report uncertainty, block auto-retry, verify.",
          "MCP: protocol error before business logic; isError: true when the operation failed.",
          "Empty results mean 'nothing found,' never 'the API failed.'"
        ]
      }
    ],
    "resources": ["r-32"]
  }
]
</script>
<script type="application/json" data-kind="lessons" data-src="l04">
[
  {
    "id": "l-04",
    "section": 4,
    "title": "Structured Data Extraction and Validation",
    "minutes": 9,
    "blocks": [
      {
        "type": "plain",
        "html": "<p>Extraction means turning messy documents — invoices, contracts, listings — into clean structured data. The goal is not \"valid JSON.\" It's data that is <strong>syntactically valid, semantically correct, traceable to its source, and safe for downstream systems</strong>. A schema can prove a field is a number; it can never prove the document actually said that number.</p><p>The most important design insight is about incentives: <strong>a required field the source might not contain pressures the model to invent a value</strong>. If listings often omit lot size but your schema demands one, you will get plausible fabricated lot sizes — schema-legal and wrong. The fix is making absence representable: nullable fields, empty-vs-null distinctions (\"no pros mentioned\" vs \"pros not addressed\"), an <code>unclear</code> enum value for ambiguous cases, and an <code>other</code> + detail-field escape hatch for evolving categories.</p><p>Tempted to add a second \"verification\" LLM call? It's usually inferior: it adds cost, can rationalize the original invention, and leaves the schema pressure in place. Fix the incentive; keep verification passes for sampling-based audits.</p>"
      },
      {
        "type": "example",
        "html": "<p>A contract says the notice period is 60 days — then Amendment 2 changes it to 45. A single <code>termination_notice_days</code> scalar is the wrong schema. High-stakes extraction carries <strong>provenance</strong>: value, <code>source_location</code> (\"Amendment 2, section 4\"), <code>source_quote</code>, and effective date, with original and amended values captured separately. Reviewers can then audit every choice against the actual text. (Note: API citations and strict JSON structured outputs may be incompatible — represent source locations as schema fields instead.)</p>"
      },
      {
        "type": "examLevel",
        "html": "<p>Validation and scale patterns the exam probes:</p><ul><li><strong>Semantic validation</strong> beyond the schema: totals reconcile, dates in range, IDs match known formats. Add reconciliation fields (<code>calculated_total</code>, <code>stated_total</code>, <code>totals_match</code>) so mismatches flag mechanically.</li><li><strong>Correction requests</strong>: source + previous extraction + exact errors. The one unfixable case: the information was never in the provided context — no retry helps; retrieve the source or route to human review.</li><li><strong>Scattered long documents</strong>: when the doc fits in context but facts are buried, a pre-extraction pass (surface decisions, amounts, dates into an intermediate) beats both chunking (loses cross-section links) and more few-shot examples (don't help find needles).</li><li><strong>Automation thresholds</strong>: segment accuracy by document type, field, and confidence band first — 97% overall can hide an 80% segment. Keep stratified sampling after launch.</li><li><strong>Batch</strong>: join results by <code>custom_id</code>, resubmit only failures, route urgent documents to real-time per-document.</li></ul>"
      },
      {
        "type": "takeaways",
        "items": [
          "Required-but-absent fields manufacture hallucinations; make absence representable.",
          "Schema compliance ≠ source truth — semantic validation in code is still mandatory.",
          "Amendments and conflicts demand provenance fields, not scalars.",
          "Scattered facts in long docs → pre-extraction pass into a structured intermediate.",
          "Segment accuracy before auto-approving anything; aggregates lie."
        ]
      }
    ],
    "resources": ["r-04", "r-19", "r-18"]
  }
]
</script>
<script type="application/json" data-kind="lessons" data-src="l05">
[
  {
    "id": "l-05",
    "section": 5,
    "title": "Conversation Context Management",
    "minutes": 9,
    "blocks": [
      {
        "type": "plain",
        "html": "<p>Because the API is stateless, every request is a fresh decision: <strong>what does the model need to see right now?</strong> Context management is that decision, made systematically. Send everything forever and sessions get slow, expensive, and unfocused; trim carelessly and the assistant forgets the user's allergy.</p><p>The key insight is that conversation content isn't one kind of thing. Safety-critical exact facts (allergies, dosages), revisable preferences (budget, dietary choice), and disposable chit-chat need <em>different treatments</em>: a protected <strong>reference section</strong> that never gets summarized, a <strong>structured state object</strong> updated on every revision, and <strong>summarization</strong> with recent turns kept verbatim. Applying one policy to all three is how exact facts get blurred away.</p><p>A big context window doesn't save you from this work — <strong>capacity is not attention</strong>. Fitting in the window doesn't make every detail equally salient; stale and verbose content dilutes what matters.</p>"
      },
      {
        "type": "example",
        "html": "<p>A meal-planning session, forty turns in: allergies stated early, \"make everything vegetarian\" stated in the middle, timing chat everywhere. Doubling the sliding window from 20 to 40 turns just defers the failure. The robust design: allergies and serving counts live in a retained reference section; current preferences live in a state object updated on each revision (\"single source of current truth\" — far more reliable than a \"prioritize recent statements\" instruction); the general discussion gets a structured summary (Decisions / Preferences / Open questions / Facts — never vague prose); the last few turns stay verbatim. And when a user states genuinely conflicting goals, surface the contradiction — don't silently average.</p>"
      },
      {
        "type": "examLevel",
        "html": "<p>Patterns for specific traffic shapes:</p><ul><li><strong>Sliding window</strong> is right when logs show old turns are rarely referenced; also apply one <em>specifically to accumulated RAG results</em> (keep the last 2–3 retrievals).</li><li><strong>Precision after summarization</strong>: when users ask for exact numbers your summaries blurred, re-inject relevant source sections on demand — lighter than a full fact store, tighter than \"higher-fidelity summaries.\"</li><li><strong>Tool result compression</strong>: keep task-relevant fields, drop 40-field payloads.</li><li><strong>API-native mechanisms</strong>: compaction <em>summarizes</em> old history server-side; context editing <em>prunes</em> stale tool results. Great for \"keep the session alive\"; application-level structures still own must-survive-verbatim facts. The <code>model_context_window_exceeded</code> stop reason is your trigger to compact — never retry unchanged.</li><li><strong>Returning users</strong>: start fresh with a structured summary + fresh lookups. Agents cite stale tool results despite instructions not to.</li><li><strong>External updates mid-chat</strong>: inject fresh state into the next request, clearly outranking older tool results.</li></ul>"
      },
      {
        "type": "takeaways",
        "items": [
          "Different content kinds need different retention: reference section, state object, summary, verbatim recent turns.",
          "Structured state beats 'prioritize recent preferences' instructions every time.",
          "Summaries must extract decisions and facts — vague narrative loses what users ask about.",
          "Compaction summarizes, context editing prunes; app-level structures guard verbatim facts.",
          "Stale tool results are landmines: returning sessions get summaries + fresh lookups."
        ]
      }
    ],
    "resources": ["r-13", "r-14", "r-01"]
  }
]
</script>
<script type="application/json" data-kind="lessons" data-src="l06">
[
  {
    "id": "l-06",
    "section": 6,
    "title": "System Prompt Engineering and Conversational Behavior",
    "minutes": 8,
    "blocks": [
      {
        "type": "plain",
        "html": "<p>The system prompt is the assistant's job description: role, tone, constraints, priorities. Two facts about it are constantly confused. First, it is <strong>not a one-time setup message</strong> — it must be sent with every request, and omitting it on later turns changes behavior <em>immediately</em>. Second, even when it IS sent every time, <strong>attention to it weakens as conversations grow</strong> — the model's own recent replies and the latest user turns compete with it. That drift is called dilution, and the fix is structural: reinforce at natural breakpoints, use examples, and move hard rules into code.</p><p>The deepest craft principle here: <strong>principles for judgment, conditionals for bright lines, code for guarantees</strong>. \"Adapt depth to the user's demonstrated expertise\" lets the model weigh dozens of implicit signals. Translating that into keyword conditionals (\"if user says X, assume novice\") forces shallow matching and misclassifies anyone atypical. Save explicit if-then rules for safety triggers, and move anything that must hold 100% of the time out of the prompt entirely.</p>"
      },
      {
        "type": "example",
        "html": "<p>A support assistant's prompt has grown to sixty bulleted rules, and tone drifts after thirty turns even though the prompt is verifiably sent. Appending \"IMPORTANT: re-read all rules\" adds one more line to the pile it's trying to rescue. What works: condense the rules; replace the seven-sentence explanation of beginner-vs-expert summaries with <strong>two contrasting examples</strong> (examples are denser than prose for behavior the model must <em>learn</em> rather than recite); add brief user-role reminders at phase changes; and enforce the non-negotiables in code. XML-style tags (<code>&lt;role&gt;</code>, <code>&lt;safety&gt;</code>) help organize and make sections referenceable — useful, not magic.</p>"
      },
      {
        "type": "examLevel",
        "html": "<p>Conversational behavior patterns that get tested:</p><ul><li><strong>Clarifying questions</strong>: ask when interpretations diverge materially, the action is irreversible/costly, or goals conflict — and ask ONE focused question, not a list. Otherwise proceed with a stated assumption the user can redirect.</li><li><strong>Conflicting preferences</strong> (\"cheapest flight\" + \"nonstop by 9 AM\"): name the tension and ask which constraint bends. Hidden compromises satisfy no one.</li><li><strong>Repetitive openers</strong>: style instruction + example of the desired opening. (The old prefill trick is rejected on current models.)</li><li><strong>State updates mid-session</strong>: the system prompt is the natural home for \"what's currently true\" — <em>except</em> on high-traffic cached agents, where rewriting it invalidates the cached prefix; there, inject state as a labeled block near the latest turn.</li><li><strong>Versioning</strong>: for multi-session conversations, treat the system prompt as living configuration; migrating personas mid-stream without versioning causes contradictions.</li></ul>"
      },
      {
        "type": "takeaways",
        "items": [
          "Send the system prompt every request; omission fails immediately, dilution degrades gradually.",
          "Principles for judgment, conditionals for safety bright lines, code for 100% rules.",
          "Contrasting few-shot examples beat long rule lists for subtle distinctions.",
          "One focused clarifying question; name conflicts instead of averaging them.",
          "On cached agents, keep the system prompt frozen and inject volatile state late."
        ]
      }
    ],
    "resources": ["r-18"]
  }
]
</script>
