<meta charset="utf-8">
<title>CCA Study Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ===== Design tokens ===== */
:root {
  --bg: #f7f6f2; --card: #ffffff; --card-alt: #f0efe9;
  --ink: #24322e; --muted: #5f6f69; --border: #dcd9d0;
  --accent: #1d5e50; --accent-ink: #ffffff; --accent-soft: #e2ece9;
  --ok: #1a7f4e; --ok-bg: #e3f2ea;
  --warn: #a06a10; --warn-bg: #f7edd8;
  --bad: #b3362b; --bad-bg: #f9e7e4;
  --shadow: 0 1px 3px rgba(36, 50, 46, 0.08);
  --radius: 10px;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #171d1b; --card: #212927; --card-alt: #1b2220;
    --ink: #e8ece9; --muted: #9caba4; --border: #33403c;
    --accent: #6fbfa9; --accent-ink: #12201c; --accent-soft: #24382f;
    --ok: #5ecf96; --ok-bg: #1c3529;
    --warn: #dfae55; --warn-bg: #372c17;
    --bad: #f08a7e; --bad-bg: #3a221f;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
  }
}
:root[data-theme="dark"] {
  --bg: #171d1b; --card: #212927; --card-alt: #1b2220;
  --ink: #e8ece9; --muted: #9caba4; --border: #33403c;
  --accent: #6fbfa9; --accent-ink: #12201c; --accent-soft: #24382f;
  --ok: #5ecf96; --ok-bg: #1c3529;
  --warn: #dfae55; --warn-bg: #372c17;
  --bad: #f08a7e; --bad-bg: #3a221f;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
}
:root[data-theme="light"] {
  --bg: #f7f6f2; --card: #ffffff; --card-alt: #f0efe9;
  --ink: #24322e; --muted: #5f6f69; --border: #dcd9d0;
  --accent: #1d5e50; --accent-ink: #ffffff; --accent-soft: #e2ece9;
  --ok: #1a7f4e; --ok-bg: #e3f2ea;
  --warn: #a06a10; --warn-bg: #f7edd8;
  --bad: #b3362b; --bad-bg: #f9e7e4;
  --shadow: 0 1px 3px rgba(36, 50, 46, 0.08);
}

/* ===== Base ===== */
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3 { line-height: 1.25; text-wrap: balance; margin: 0 0 .5rem; }
h1 { font-size: 1.5rem; letter-spacing: -0.015em; }
h2 { font-size: 1.2rem; letter-spacing: -0.01em; }
h3 { font-size: 1rem; }
p { margin: 0 0 .9rem; }
a { color: var(--accent); }
code { font-family: var(--mono); font-size: .875em; background: var(--card-alt); padding: .1em .35em; border-radius: 4px; }
pre { background: var(--card-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem 1rem; overflow-x: auto; }
pre code { background: none; padding: 0; }
table { border-collapse: collapse; width: 100%; font-size: .92rem; }
th, td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid var(--border); }
th { font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
.table-wrap { overflow-x: auto; }
button { font: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

/* ===== App frame ===== */
.frame { max-width: 58rem; margin: 0 auto; padding: 0 1rem 4rem; }
header.app {
  display: flex; align-items: baseline; gap: .75rem; flex-wrap: wrap;
  padding: 1.1rem 0 .4rem;
}
header.app .brand { font-weight: 800; font-size: 1.05rem; letter-spacing: -0.01em; }
header.app .brand small { color: var(--muted); font-weight: 500; margin-left: .5rem; }
nav.tabs {
  display: flex; gap: .25rem; overflow-x: auto; padding: .4rem 0 .9rem;
  scrollbar-width: none;
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs a {
  text-decoration: none; color: var(--muted); font-size: .9rem; font-weight: 600;
  padding: .35rem .75rem; border-radius: 99px; white-space: nowrap;
}
nav.tabs a.active { background: var(--accent); color: var(--accent-ink); }
nav.tabs a:not(.active):hover { background: var(--card-alt); color: var(--ink); }

/* ===== Components ===== */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 1.1rem 1.25rem; margin-bottom: .9rem;
}
.card.flat { box-shadow: none; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
@media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
.row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
.spread { display: flex; align-items: center; justify-content: space-between; gap: .75rem; flex-wrap: wrap; }
.stack { display: flex; flex-direction: column; gap: .55rem; }
.muted { color: var(--muted); }
.small { font-size: .88rem; }
.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.eyebrow { font-size: .74rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; }

.btn {
  display: inline-block; border: 1px solid var(--border); background: var(--card);
  color: var(--ink); border-radius: 8px; padding: .5rem 1rem; font-weight: 600;
  font-size: .92rem; text-decoration: none; text-align: center;
}
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.btn.danger { color: var(--bad); }
.btn.sm { padding: .3rem .7rem; font-size: .84rem; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

.pill {
  display: inline-block; font-size: .76rem; font-weight: 700; padding: .12rem .6rem;
  border-radius: 99px; text-transform: uppercase; letter-spacing: .04em;
}
.pill.ok { color: var(--ok); background: var(--ok-bg); }
.pill.warn { color: var(--warn); background: var(--warn-bg); }
.pill.bad { color: var(--bad); background: var(--bad-bg); }
.pill.neutral { color: var(--muted); background: var(--card-alt); }

.bar { height: 8px; background: var(--card-alt); border-radius: 99px; overflow: hidden; position: relative; }
.bar > i { display: block; height: 100%; background: var(--accent); border-radius: 99px; }
.bar > b.marker { position: absolute; top: -2px; width: 2px; height: 12px; background: var(--warn); }

.banner {
  border-radius: var(--radius); padding: .75rem 1.1rem; margin-bottom: .9rem;
  font-size: .92rem; border: 1px solid var(--border);
}
.banner.warn { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
.banner.bad { background: var(--bad-bg); color: var(--bad); border-color: transparent; }

/* Question renderer */
.q-stem { font-size: 1.02rem; margin-bottom: 1rem; }
.q-opts { display: flex; flex-direction: column; gap: .5rem; }
.q-opt {
  display: flex; gap: .7rem; align-items: baseline; text-align: left;
  border: 1px solid var(--border); background: var(--card); color: var(--ink);
  border-radius: 8px; padding: .65rem .85rem; width: 100%; font-size: .95rem; line-height: 1.5;
}
.q-opt:not(:disabled):hover { border-color: var(--accent); }
.q-opt .letter { font-family: var(--mono); font-weight: 700; color: var(--muted); }
.q-opt.selected { border-color: var(--accent); background: var(--accent-soft); }
.q-opt.correct { border-color: var(--ok); background: var(--ok-bg); }
.q-opt.wrong { border-color: var(--bad); background: var(--bad-bg); }
.q-rationale { font-size: .88rem; color: var(--muted); margin: .35rem 0 0 1.9rem; }

/* Flashcard */
.flashcard {
  min-height: 11rem; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 1.5rem; font-size: 1.05rem; cursor: pointer;
}

/* Timer */
.timer { font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 700; font-size: 1.05rem; }
.timer.low { color: var(--bad); }

/* Mastery ring (SVG) */
.ring-wrap { display: flex; align-items: center; gap: 1.1rem; }

footer.app {
  margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);
  font-size: .8rem; color: var(--muted);
}
</style>
